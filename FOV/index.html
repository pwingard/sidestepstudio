<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Barnard's Loop FOV Planner</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b0e14" />

  <!-- iOS standalone install -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Loop FOV" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="titlebar">
    <h1>Barnard's Loop</h1>
    <p class="subtitle">FOV Planner</p>
    <span id="ver" class="ver"></span>
  </header>

  <main>
    <!-- Right column on wide screens: selection controls -->
    <div class="pane pane-side">
      <!-- Selectors -->
      <section class="controls">
        <label class="field">
          <span>Configuration</span>
          <select id="configSelect"></select>
        </label>
        <label class="field">
          <span>Target</span>
          <select id="targetSelect"></select>
        </label>
        <div class="field">
          <span>Find object by name</span>
          <div class="find-row">
            <input id="findInput" type="search" autocapitalize="off" autocorrect="off"
                   spellcheck="false" placeholder="e.g. M42, NGC 7000, Sh2-129" />
            <button id="findBtn" type="button">Find</button>
          </div>
          <p id="findStatus" class="find-status"></p>
        </div>
      </section>

      <!-- Editor for a custom (resolved-by-name) target -->
      <section id="customPanel" class="custom-panel" hidden></section>

      <!-- Camera legend / toggles -->
      <section id="legend" class="legend" aria-label="Cameras"></section>
    </div>

    <!-- Left column on wide screens: the diagram and its tools -->
    <div class="pane pane-main">
      <!-- Diagram -->
      <section class="diagram-wrap">
        <svg id="diagram" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"
             role="img" aria-label="Field of view diagram"></svg>
        <p class="caption">dashed = image circle (full-frame coverage)</p>
      </section>

      <!-- Optional per-target object image -->
      <section id="imagePanel" class="image-panel"></section>

      <!-- Metric cards -->
      <section id="cards" class="cards"></section>

      <!-- Verdict -->
      <section class="verdict-wrap">
        <p id="verdict" class="verdict"></p>
      </section>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    // Register the service worker (HTTPS or localhost only).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function (err) {
          console.warn("SW registration failed (needs HTTPS or localhost):", err);
        });
      });
    }
  </script>
</body>
</html>
