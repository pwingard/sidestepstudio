<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Messier">
<title>Messier — Master</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    cursor: none;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  .scene {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
    opacity: 0;
    transition: opacity 700ms ease;
    pointer-events: none;
  }
  .scene.show { opacity: 1; }

  .scene img {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
    display: block;
  }

  /* Scene 1 — portrait, slow push into Messier's right eye (viewer's left). */
  #portrait img {
    transform-origin: 37% 31%;
    transition: transform 39000ms ease-in-out;  /* zoom continues nearly through to the last caption */
  }
  #portrait.zooming img {
    transform: scale(5.2);
  }

  /* Scene 3 — M16 landing, slow push into the Pillars (dead-center, slightly
     low), then cross-fade to the Hubble close-up. Stack images via absolute
     positioning so they can overlap during the dissolve. */
  #landing { /* override flex centering to allow absolute children */ }
  #landing img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
  }
  #landing-base {
    transform-origin: 50% 55%;
    transition: transform 6500ms ease-in-out, opacity 1700ms ease-in-out;
  }
  #landing.zooming #landing-base {
    transform: scale(3.4);
  }
  #landing.show-pillars #landing-base {
    opacity: 0;  /* fade the wide M16 out behind the close-up */
  }
  #landing-pillars {
    opacity: 0;
    transform: scale(1);
    transform-origin: 50% 50%;
    transition: opacity 1700ms ease-in-out, transform 5500ms ease-out;
  }
  #landing.show-pillars #landing-pillars {
    opacity: 1;
    transform: scale(1.08);  /* gentle continued push-in on the Hubble shot */
  }

  /* Voiceover-style caption overlay. */
  #caption {
    position: fixed;
    bottom: 9vh;
    left: 4vw; right: 4vw;
    text-align: center;
    color: #fff;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.65rem;
    font-weight: 500;
    line-height: 1.18;
    letter-spacing: 0.01em;
    opacity: 0;
    transition: opacity 350ms ease;
    text-shadow: 0 2px 14px rgba(0,0,0,0.95), 0 0 24px rgba(0,0,0,0.7);
    pointer-events: none;
  }
  #caption.show { opacity: 1; }
  #caption.title {
    font-size: 3.4rem;
    font-weight: 700;
    font-style: italic;
    letter-spacing: 0.04em;
    bottom: 22vh;  /* lifted to clear the credits below */
  }

  #start {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #888;
    font-size: 1.3rem;
    cursor: pointer;
    z-index: 10;
  }
  #start.hide { display: none; }

  /* Closing credits — small italic block beneath the "See the Show!" title. */
  #credits {
    position: fixed;
    bottom: 2.5vh;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255, 255, 255, 0.78);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 1.05rem;
    line-height: 1.6;
    letter-spacing: 0.03em;
    opacity: 0;
    transition: opacity 1500ms ease-in;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.95);
    pointer-events: none;
  }
  #credits.show { opacity: 1; }

  /* Final fade to black after the music has faded out. */
  #blackout {
    position: fixed; inset: 0;
    background: #000;
    opacity: 0;
    transition: opacity 3000ms ease-in;
    pointer-events: none;
    z-index: 100;
  }
  #blackout.show { opacity: 1; }

  /* Catalog-number tag on each flash image. */
  #flash-tag {
    position: fixed;
    top: 6vh; left: 6vw;
    color: rgba(255,255,255,0.92);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.95), 0 0 18px rgba(0,0,0,0.7);
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms ease;
  }
  #flash.show ~ #flash-tag { opacity: 1; }
</style>
</head>
<body>
  <div id="portrait" class="scene"><img src="messier-portrait.jpg" alt=""></div>
  <div id="flash"    class="scene"><img id="flash-img" src="" alt=""></div>
  <div id="landing"  class="scene">
    <img id="landing-base"    src="M016.jpg"           alt="">
    <img id="landing-pillars" src="pillars-hubble.jpg" alt="">
  </div>
  <div id="flash-tag"></div>
  <div id="caption"></div>
  <div id="credits">
    Music: J.S. Bach, Cello Suite No. 1, BWV 1007 (PD)<br>
    Imagery: NASA · Hubble · Wikimedia Commons<br>
    Catalog: Messier (1771–1781) with Pierre Méchain<br>
    Earlier sources: Halley (1715) · Hodierna (1654) · Lacaille (1755) · Bode<br>
    Video put together by Sidestep Studio
  </div>
  <audio id="audio" src="soundtrack.mp3" preload="auto"></audio>
  <div id="blackout"></div>
  <div id="start">Click to start the master montage</div>

<script>
  // ===== TIMING (all ms) =====
  const PORTRAIT_HOLD       = 700;    // beat after fade-in before zoom kicks off
  const PORTRAIT_ZOOM       = 39000;  // duration of eye push-in (CSS-matched)
  const PORTRAIT_TAIL       = 1500;   // brief hold on the eye after the last caption reads

  // Captions during the portrait zoom. Each fades in at `at` ms (relative to
  // when the zoom kicks off), holds for `hold` ms, then fades out.
  // Steady ~3.5s rhythm: each caption appears about 3.5 seconds after the
  // previous one. Hold ≈ 2.5s of visible time, ~1s gap before the next beat.
  const PORTRAIT_CAPTIONS = [
    { at:    700, hold: 2500, text: 'Charles Messier<br>(1730–1817)' },
    { at:   4200, hold: 2500, text: 'was an 18th-century French astronomer.' },
    { at:   7700, hold: 2500, text: 'Messier was obsessed with discovering' },
    { at:  11200, hold: 2500, text: 'new comets.' },
    { at:  14700, hold: 2500, text: 'But many of the dark’s fuzzy objects' },
    { at:  18200, hold: 2500, text: 'did not move' },
    { at:  21700, hold: 2500, text: 'and therefore could not be comets.' },
    { at:  25200, hold: 2500, text: 'To help avoid them in the future' },
    { at:  28700, hold: 2500, text: 'he created and organised his list.' },
    { at:  32200, hold: 2500, text: 'Messier’s List was essentially' },
    { at:  35700, hold: 4200, text: 'a list of<br>“Not Comets”.' },
  ];

  // Captions during the flash montage. The catalog reveal punctuated by three
  // beats; timing matched roughly to the requested image-count cues.
  const FLASH_CAPTIONS = [
    { at:    200, hold: 3800, text: 'What he accomplished instead…' },
    { at:   4200, hold: 4500, text: 'was a catalog of 110 of the most beautiful' },
    { at:   8900, hold: 4200, text: '“Not-a-Comet” objects found in the night sky.' },
  ];

  const FLASH_M1_HOLD_MS    = 1200;   // M1 special hold — let it land
  const FLASH_SECOND_MS     = 380;    // M2 (first non-M1) holds this long
  const FLASH_LAST_MS       = 35;     // last image (M110) holds this long

  const LANDING_PRE         = 600;    // beat before Pillars zoom starts

  // Pillars zoom — first a reflective beat over the wide M16 hold, then the
  // brand tag once the Hubble close-up has fully resolved.
  const LANDING_CAPTIONS = [
    { at: 1000, hold: 4000, text: 'Thank you, Monsieur Messier.' },
    { at: 7500, hold: null, text: 'See the Show!', title: true },
  ];

  // ===== ELEMENTS =====
  const portrait = document.getElementById('portrait');
  const flash    = document.getElementById('flash');
  const flashImg = document.getElementById('flash-img');
  const flashTag = document.getElementById('flash-tag');
  const landing  = document.getElementById('landing');
  const caption  = document.getElementById('caption');
  const credits  = document.getElementById('credits');
  const blackout = document.getElementById('blackout');
  const audio    = document.getElementById('audio');
  const start    = document.getElementById('start');

  // ===== AUDIO =====
  // iOS makes audio.volume read-only, so we route through Web Audio API and
  // ramp a GainNode instead. Falls back to volume ramp on browsers without it.
  const AUDIO_PEAK_VOL  = 0.55;  // peak gain (0–1)
  const AUDIO_FADE_IN   = 1500;  // ramp up over this many ms
  const AUDIO_FADE_OUT  = 2500;  // ramp down at end of show
  const AUDIO_FADE_STEP = 50;    // fallback-only ramp tick (ms)
  let audioCtx = null;
  let audioGain = null;

  function initAudioGraph() {
    if (audioCtx) return;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
      const source = audioCtx.createMediaElementSource(audio);
      audioGain = audioCtx.createGain();
      audioGain.gain.value = 0;
      source.connect(audioGain);
      audioGain.connect(audioCtx.destination);
    } catch (e) {
      audioCtx = null;
      audioGain = null;
    }
  }

  // Flash sequence: M1..M110 in order, skipping M16 (saved for landing).
  const sequence = [];
  for (let i = 1; i <= 110; i++) {
    if (i !== 16) sequence.push(i);
  }
  const N = sequence.length; // 109

  function pad(n) { return String(n).padStart(3, '0'); }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // Preload images so flashes are smooth.
  for (let i = 1; i <= 110; i++) {
    const im = new Image(); im.src = `M${pad(i)}.jpg`;
  }
  (new Image()).src = 'messier-portrait.jpg';
  (new Image()).src = 'pillars-hubble.jpg';

  function intervalAt(i) {
    // M1 gets a long hold to land; the rest follow an exponential decay
    // from FLASH_SECOND_MS down to FLASH_LAST_MS — every image ~3% faster
    // than the previous, so the acceleration is felt continuously.
    if (i === 0) return FLASH_M1_HOLD_MS;
    const t = (i - 1) / (N - 2);
    return FLASH_SECOND_MS * Math.pow(FLASH_LAST_MS / FLASH_SECOND_MS, t);
  }

  function showOnly(id) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('show'));
    document.getElementById(id).classList.add('show');
  }

  function fadeAudioTo(target, durationMs) {
    if (audioGain && audioCtx) {
      const t = audioCtx.currentTime;
      audioGain.gain.cancelScheduledValues(t);
      audioGain.gain.setValueAtTime(audioGain.gain.value, t);
      audioGain.gain.linearRampToValueAtTime(target, t + durationMs / 1000);
      return;
    }
    // Fallback for browsers without Web Audio API.
    if (!audio.src || audio.error) return;
    const startVol = audio.volume;
    const ticks = Math.max(1, Math.floor(durationMs / AUDIO_FADE_STEP));
    let i = 0;
    const interval = setInterval(() => {
      i++;
      audio.volume = Math.max(0, Math.min(1,
        startVol + (target - startVol) * (i / ticks)));
      if (i >= ticks) clearInterval(interval);
    }, AUDIO_FADE_STEP);
  }

  function startAudio() {
    // Initialize and resume Web Audio context inside the user-gesture
    // (iOS requires both for autoplay + gain control to work).
    initAudioGraph();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    // When routed through the gain node, leave element volume at 1; the
    // GainNode controls the actual loudness. On the fallback path, start
    // silent and ramp via volume.
    audio.volume = (audioGain ? 1 : 0);
    const promise = audio.play();
    if (promise && promise.catch) promise.catch(() => {});
    fadeAudioTo(AUDIO_PEAK_VOL, AUDIO_FADE_IN);
  }

  function stopAudio(delayMs) {
    setTimeout(() => fadeAudioTo(0, AUDIO_FADE_OUT), delayMs);
  }

  async function play() {
    start.classList.add('hide');
    startAudio();

    // Scene 1: portrait, push into the eye + caption track.
    showOnly('portrait');
    await sleep(PORTRAIT_HOLD);
    portrait.classList.add('zooming');
    runCaptions(PORTRAIT_CAPTIONS);
    await sleep(PORTRAIT_ZOOM + PORTRAIT_TAIL);
    caption.classList.remove('show'); // clear any lingering portrait caption before flash starts

    // Scene 2: flash montage, accelerating + caption track + per-image M-tag.
    showOnly('flash');
    runCaptions(FLASH_CAPTIONS);
    for (let i = 0; i < N; i++) {
      const num = sequence[i];
      flashImg.src = `M${pad(num)}.jpg`;
      flashTag.textContent = `Messier ${num}`;
      await sleep(intervalAt(i));
    }
    flashTag.textContent = '';        // clear tag before landing scene
    caption.classList.remove('show'); // clear before landing scene

    // Scene 3: land on M16, push into the Pillars region, then cross-fade
    // to the Hubble close-up of the Pillars themselves. Run caption track.
    showOnly('landing');
    await sleep(LANDING_PRE);
    landing.classList.add('zooming');
    runCaptions(LANDING_CAPTIONS);

    // Cross-fade to the Hubble Pillars close-up near the end of the M16 zoom.
    setTimeout(() => landing.classList.add('show-pillars'), 5200);

    // Closing credits fade in a moment after "See the Show!" has landed.
    setTimeout(() => credits.classList.add('show'), 9500);

    // Fade the soundtrack out after the credits have time to register.
    stopAudio(13000);

    // Once the music has faded, fade the screen to black.
    // (Music fade ends at 13000 + AUDIO_FADE_OUT = 15500ms.)
    setTimeout(() => blackout.classList.add('show'), 15500);
  }

  // Schedule a sequence of captions. Each fades in at `at`, stays for `hold`
  // ms, then fades out. If `hold` is null the caption stays visible.
  function runCaptions(track) {
    track.forEach(c => {
      setTimeout(() => {
        caption.innerHTML = c.text;  // allow <br> and other markup in captions
        caption.classList.toggle('title', !!c.title);
        caption.classList.add('show');
      }, c.at);
      if (c.hold != null) {
        setTimeout(() => caption.classList.remove('show'), c.at + c.hold);
      }
    });
  }

  start.addEventListener('click', play);
  document.addEventListener('keydown', play, { once: true });
</script>
</body>
</html>
