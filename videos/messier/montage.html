<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messier Montage</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    cursor: none;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #img {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
    display: block;
    transform-origin: 50% 55%;  /* anchored on the Pillars inside M16 */
    transition: transform 6500ms ease-in-out;
  }
  #img.zoom {
    transform: scale(3.2);
  }
  #label {
    position: fixed;
    bottom: 6vh;
    left: 0; right: 0;
    text-align: center;
    color: #fff;
    font-size: 2.6rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 700ms ease-in;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  }
  #label.show { opacity: 1; }
  #start {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #888;
    font-size: 1.4rem;
    cursor: pointer;
  }
  #start.hide { display: none; }
</style>
</head>
<body>
  <div id="stage">
    <img id="img" src="" alt="">
  </div>
  <div id="label"></div>
  <div id="start">Click to start the montage</div>

<script>
  // ---------- CONFIGURE ----------
  const FLASH_MS = 90;       // ms per image during the rapid flash
  const LANDING_NUM = 16;    // M16 - Eagle Nebula (Pillars of Creation)
  const LANDING_LABEL = 'M16 — The Pillars of Creation';
  const HOLD_MS = 5000;      // hold on landing before the page goes idle
  const ZOOM_DELAY_MS = 400; // beat after landing before zoom starts
  const LABEL_DELAY_MS = 2200; // when to fade in the label during the zoom
  // -------------------------------

  const stage = document.getElementById('img');
  const label = document.getElementById('label');
  const start = document.getElementById('start');

  // Build sequence: M1..M110 with the landing pulled out and appended last
  const sequence = [];
  for (let i = 1; i <= 110; i++) {
    if (i !== LANDING_NUM) sequence.push(i);
  }
  // Optional: shuffle the flash order so it feels like a flurry, not a numeric crawl
  for (let i = sequence.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [sequence[i], sequence[j]] = [sequence[j], sequence[i]];
  }
  sequence.push(LANDING_NUM);

  function pad(n) { return String(n).padStart(3, '0'); }

  // Preload all images
  const cache = {};
  for (let i = 1; i <= 110; i++) {
    const im = new Image();
    im.src = `M${pad(i)}.jpg`;
    cache[i] = im;
  }

  function play() {
    start.classList.add('hide');
    let idx = 0;
    function tick() {
      const num = sequence[idx];
      stage.src = `M${pad(num)}.jpg`;
      idx++;
      if (idx < sequence.length) {
        setTimeout(tick, FLASH_MS);
      } else {
        // Landed on M16: kick off the slow zoom into the Pillars,
        // then fade the label in part-way through.
        setTimeout(() => stage.classList.add('zoom'), ZOOM_DELAY_MS);
        setTimeout(() => {
          label.textContent = LANDING_LABEL;
          label.classList.add('show');
        }, LABEL_DELAY_MS);
      }
    }
    tick();
  }

  start.addEventListener('click', play);
  // also trigger on any key press
  document.addEventListener('keydown', play, { once: true });
</script>
</body>
</html>
